spring.config.import=optional:file:.env[.properties]
spring.application.name=SmartSpendCopilot

# MYSQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Enable the system to automatically create and modify tables based on Java code.
spring.jpa.hibernate.ddl-auto=update
# Enable SQL Log Switch
spring.jpa.show-sql=true
# format SQL statements
spring.jpa.properties.hibernate.format_sql=true

# Gemini
gemini.api.key = ${GEMINI_API_TOKEN}

# Exchange Rate
exchange.api.base-url=https://open.er-api.com/v6/latest/


